name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      web: ${{ steps.filter.outputs.web }}
      kim: ${{ steps.filter.outputs.kim }}
      api: ${{ steps.filter.outputs.api }}
      worker: ${{ steps.filter.outputs.worker }}
      cli: ${{ steps.filter.outputs.cli }}
      email-worker: ${{ steps.filter.outputs.email-worker }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            web:
              - 'apps/web/**'
              - 'packages/**'
              - 'scripts/generate-sitemap.ts'
              - 'package.json'
              - 'bun.lock'
            kim:
              - 'apps/kim/**'
              - 'packages/**'
              - 'package.json'
              - 'bun.lock'
            api:
              - 'api/**'
              - 'workers/api-container/**'
            worker:
              - 'api/**'
              - 'workers/worker-container/**'
            cli:
              - 'cli/**'
            email-worker:
              - 'workers/email-inbound/**'

  deploy-web:
    name: Deploy Web (Cloudflare Workers)
    needs: changes
    if: needs.changes.outputs.web == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare environment
        uses: n1rna/ee-action@main
        with:
          environment: production
          config_path: apps/web/.ee.web
          env_file: apps/web/.env.web.production
          gh_secret: ${{ secrets.ENV_VARS_WEB }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build
        working-directory: apps/web
        run: |
          set -a
          source .env.web.production
          set +a
          bunx opennextjs-cloudflare build

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/web
          command: deploy
          packageManager: bun

  deploy-kim:
    name: Deploy Kim (Cloudflare Workers)
    needs: changes
    if: needs.changes.outputs.kim == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare environment
        uses: n1rna/ee-action@main
        with:
          environment: production
          config_path: apps/kim/.ee.kim
          env_file: apps/kim/.env.kim.production
          gh_secret: ${{ secrets.ENV_VARS_KIM }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build
        working-directory: apps/kim
        run: |
          set -a
          source .env.kim.production
          set +a
          bunx opennextjs-cloudflare build

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/kim
          command: deploy
          packageManager: bun

  deploy-api:
    name: Deploy API (Cloudflare Container)
    needs: changes
    if: needs.changes.outputs.api == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: workers/api-container
        run: bun install

      - name: Deploy API Container
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/api-container
          command: deploy --config wrangler.toml
          packageManager: bun

  deploy-worker:
    name: Deploy Worker (Cloudflare Container)
    needs: changes
    if: needs.changes.outputs.worker == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: workers/worker-container
        run: bun install

      - name: Deploy Worker Container
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/worker-container
          command: deploy --config wrangler.toml
          packageManager: bun

  release-cli:
    name: Release CLI
    needs: changes
    if: needs.changes.outputs.cli == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: linux
            goarch: arm64
            ext: ""
          - goos: darwin
            goarch: amd64
            ext: ""
          - goos: darwin
            goarch: arm64
            ext: ""
          - goos: windows
            goarch: amd64
            ext: ".exe"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: cli/go.sum

      - name: Compute version
        id: version
        run: |
          # Count commits touching cli/ to auto-increment patch version
          CLI_COMMITS=$(git log --oneline -- cli/ | wc -l)
          VERSION="0.1.${CLI_COMMITS}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "CLI version: ${VERSION}"

      - name: Build
        working-directory: cli
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build -ldflags "-s -w -X github.com/n1rna/1tt/cli/cmd.Version=v${{ steps.version.outputs.version }}" \
            -o "../dist/1tt-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: 1tt-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/1tt-*

  publish-cli:
    name: Publish CLI Release
    needs: release-cli
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute version
        id: version
        run: |
          CLI_COMMITS=$(git log --oneline -- cli/ | wc -l)
          VERSION="0.1.${CLI_COMMITS}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create checksums
        working-directory: dist
        run: sha256sum 1tt-* > checksums.txt

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "cli/v${{ steps.version.outputs.version }}"
          name: "CLI v${{ steps.version.outputs.version }}"
          body: |
            ## 1tt CLI v${{ steps.version.outputs.version }}

            Connect your local PostgreSQL or Redis databases to [1tt.dev](https://1tt.dev) studio via a secure tunnel.

            ### Install (recommended)

            ```bash
            curl -sSfL https://1tt.dev/cli/install.sh | sh
            ```

            This auto-detects your OS/architecture, downloads the correct binary, and installs it. If you already have the latest version, it skips the download.

            ### Install + Run in one command

            ```bash
            curl -sSfL https://1tt.dev/cli/install.sh | sh -s -- tunnel --token <TOKEN> --db postgres://localhost:5432/mydb
            ```

            ### Manual download

            | Platform | Binary |
            |----------|--------|
            | macOS (Apple Silicon) | [`1tt-darwin-arm64`](https://github.com/n1rna/1tt/releases/download/cli/v${{ steps.version.outputs.version }}/1tt-darwin-arm64) |
            | macOS (Intel) | [`1tt-darwin-amd64`](https://github.com/n1rna/1tt/releases/download/cli/v${{ steps.version.outputs.version }}/1tt-darwin-amd64) |
            | Linux (x86_64) | [`1tt-linux-amd64`](https://github.com/n1rna/1tt/releases/download/cli/v${{ steps.version.outputs.version }}/1tt-linux-amd64) |
            | Linux (ARM64) | [`1tt-linux-arm64`](https://github.com/n1rna/1tt/releases/download/cli/v${{ steps.version.outputs.version }}/1tt-linux-arm64) |
            | Windows (x86_64) | [`1tt-windows-amd64.exe`](https://github.com/n1rna/1tt/releases/download/cli/v${{ steps.version.outputs.version }}/1tt-windows-amd64.exe) |

            After downloading manually, make it executable and move to your PATH:
            ```bash
            chmod +x 1tt-* && sudo mv 1tt-* /usr/local/bin/1tt
            ```

            ### Usage

            ```bash
            1tt tunnel --token <TOKEN> --db postgres://user:pass@localhost:5432/mydb
            ```

            Get your token from [1tt.dev/account/databases](https://1tt.dev/account/databases) → **Connect External**.
          files: |
            dist/1tt-*
            dist/checksums.txt
          draft: false
          prerelease: false
          make_latest: true

  deploy-email-worker:
    name: Deploy Email Worker
    needs: changes
    if: needs.changes.outputs.email-worker == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: workers/email-inbound
        run: bun install

      - name: Deploy Email Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/email-inbound
          command: deploy --config wrangler.toml
          packageManager: bun
