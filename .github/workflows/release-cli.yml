name: Release CLI

on:
  push:
    tags:
      - "cli/v*"

permissions:
  contents: write

jobs:
  build:
    name: Build CLI (${{ matrix.os }}-${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            ext: ""
          - os: linux
            arch: arm64
            ext: ""
          - os: darwin
            arch: amd64
            ext: ""
          - os: darwin
            arch: arm64
            ext: ""
          - os: windows
            arch: amd64
            ext: ".exe"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: cli/go.sum

      - name: Build
        working-directory: cli
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: "0"
        run: |
          VERSION="${GITHUB_REF_NAME#cli/}"
          go build -ldflags "-s -w -X github.com/n1rna/1tt/cli/cmd.Version=${VERSION}" \
            -o "../dist/1tt-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: 1tt-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/1tt-*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create checksums
        working-directory: dist
        run: sha256sum 1tt-* > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "CLI ${{ github.ref_name }}"
          body: |
            ## 1tt CLI ${{ github.ref_name }}

            Connect your local PostgreSQL or Redis databases to [1tt.dev](https://1tt.dev) studio via a secure tunnel.

            ### Installation

            **macOS (Apple Silicon):**
            ```bash
            curl -L https://github.com/n1rna/1tt/releases/download/${{ github.ref_name }}/1tt-darwin-arm64 -o 1tt
            chmod +x 1tt && sudo mv 1tt /usr/local/bin/
            ```

            **macOS (Intel):**
            ```bash
            curl -L https://github.com/n1rna/1tt/releases/download/${{ github.ref_name }}/1tt-darwin-amd64 -o 1tt
            chmod +x 1tt && sudo mv 1tt /usr/local/bin/
            ```

            **Linux (x86_64):**
            ```bash
            curl -L https://github.com/n1rna/1tt/releases/download/${{ github.ref_name }}/1tt-linux-amd64 -o 1tt
            chmod +x 1tt && sudo mv 1tt /usr/local/bin/
            ```

            **Linux (ARM64):**
            ```bash
            curl -L https://github.com/n1rna/1tt/releases/download/${{ github.ref_name }}/1tt-linux-arm64 -o 1tt
            chmod +x 1tt && sudo mv 1tt /usr/local/bin/
            ```

            **Windows:**
            Download `1tt-windows-amd64.exe` and add it to your PATH.

            ### Usage

            ```bash
            1tt tunnel --token <TOKEN> --db postgres://user:pass@localhost:5432/mydb
            ```

            Get your token from [1tt.dev/account/databases](https://1tt.dev/account/databases) → Connect External.
          files: |
            dist/1tt-*
            dist/checksums.txt
          draft: false
          prerelease: false
