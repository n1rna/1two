name = "1tt-email-inbound"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[vars]
API_URL = "https://1tt.dev/api/v1/life/webhooks/email"

# Cloudflare Email Service binding — sends transactional emails to any recipient
[[email]]
name = "SEND_EMAIL"

# Legacy send_email binding for Email Routing replies
[[send_email]]
name = "SEB"

# EMAIL_WEBHOOK_SECRET is set via `wrangler secret put EMAIL_WEBHOOK_SECRET`
