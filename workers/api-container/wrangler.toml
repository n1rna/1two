name = "onetruetool-api"
main = "src/index.ts"
compatibility_date = "2025-03-09"
compatibility_flags = ["nodejs_compat"]

[[containers]]
class_name = "ApiContainer"
image = "./../../api/Dockerfile"
max_instances = 1

[[durable_objects.bindings]]
class_name = "ApiContainer"
name = "API_CONTAINER"

[[migrations]]
new_sqlite_classes = ["ApiContainer"]
tag = "v1"

[observability.logs]
enabled = true
invocation_logs = true

[triggers]
crons = ["0 3 * * *", "*/15 * * * *"]

# Queue: producer binding (used by cron to enqueue work items)
[[queues.producers]]
queue = "life-scheduler"
binding = "SCHEDULER_QUEUE"

# Queue: consumer binding (processes work items one at a time)
[[queues.consumers]]
queue = "life-scheduler"
max_batch_size = 1
max_retries = 2
