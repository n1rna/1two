name = "onetruetool-api"
main = "src/index.ts"
compatibility_date = "2025-03-09"
compatibility_flags = ["nodejs_compat"]

[[containers]]
class_name = "ApiContainer"
image = "./../../api/Dockerfile"
max_instances = 1

[[durable_objects.bindings]]
class_name = "ApiContainer"
name = "API_CONTAINER"

[[migrations]]
new_sqlite_classes = ["ApiContainer"]
tag = "v1"

[observability.logs]
enabled = true
invocation_logs = true

# Cron + Queue bindings were removed: scheduler, summary regeneration, and
# cleanup all run as River PeriodicJobs in the always-on worker container
# (workers/worker-container). See cmd/worker/main.go.
