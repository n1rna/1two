name = "onetruetool-api"
main = "src/index.ts"
compatibility_date = "2025-03-09"
compatibility_flags = ["nodejs_compat"]

[[containers]]
class_name = "ApiContainer"
image = "./../../api/Dockerfile"
max_instances = 1

[[durable_objects.bindings]]
class_name = "ApiContainer"
name = "API_CONTAINER"

[[migrations]]
new_sqlite_classes = ["ApiContainer"]
tag = "v1"

[observability.logs]
enabled = true
invocation_logs = true

[triggers]
crons = ["0 3 * * *"]  # daily at 3 AM UTC — cleanup expired files
