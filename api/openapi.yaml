openapi: 3.1.0
info:
  title: 1tt API
  version: 0.1.0
  description: Backend API for 1tt.dev developer tools

servers:
  - url: /api/proxy

paths:
  /health:
    get:
      operationId: getHealth
      summary: Health check
      tags: [system]
      responses:
        "200":
          description: Service healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /dns/lookup:
    post:
      operationId: dnsLookup
      summary: DNS record lookup
      tags: [dns]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DNSLookupRequest"
      responses:
        "200":
          description: DNS lookup result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DNSLookupResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          description: Turnstile token invalid or expired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: DNS resolution failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /files:
    post:
      operationId: uploadFile
      summary: Upload a file
      tags: [files]
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: File uploaded successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileInfo"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "400":
          $ref: "#/components/responses/BadRequest"

    get:
      operationId: listFiles
      summary: List uploaded files
      tags: [files]
      security:
        - sessionAuth: []
      responses:
        "200":
          description: List of files
          content:
            application/json:
              schema:
                type: object
                properties:
                  files:
                    type: array
                    items:
                      $ref: "#/components/schemas/FileInfo"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /pastes:
    post:
      operationId: createPaste
      summary: Create a new paste
      tags: [pastes]
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePasteRequest"
      responses:
        "201":
          description: Paste created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PasteCreateResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

    get:
      operationId: listPastes
      summary: List the current user's pastes (metadata only)
      tags: [pastes]
      security:
        - sessionAuth: []
      responses:
        "200":
          description: List of pastes
          content:
            application/json:
              schema:
                type: object
                properties:
                  pastes:
                    type: array
                    items:
                      $ref: "#/components/schemas/PasteInfo"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /pastes/{id}:
    get:
      operationId: getPaste
      summary: Get a paste by ID (public)
      tags: [pastes]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Paste content and metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PasteDetail"
        "404":
          $ref: "#/components/responses/NotFound"
        "410":
          description: Paste has expired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    put:
      operationId: updatePaste
      summary: Update a paste (owner only)
      tags: [pastes]
      security:
        - sessionAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePasteRequest"
      responses:
        "200":
          description: Paste updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PasteInfo"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      operationId: deletePaste
      summary: Delete a paste (owner only)
      tags: [pastes]
      security:
        - sessionAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Paste deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /files/{id}:
    get:
      operationId: getFile
      summary: Download a file
      tags: [files]
      security:
        - sessionAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: File content
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      operationId: deleteFile
      summary: Delete a file
      tags: [files]
      security:
        - sessionAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: File deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /life/travel/trips:
    get:
      operationId: listTrips
      summary: List trips the caller owns or is a member of
      tags: [travel]
      security:
        - sessionAuth: []
      responses:
        "200":
          description: Trip list
          content:
            application/json:
              schema:
                type: object
                properties:
                  trips:
                    type: array
                    items: { $ref: "#/components/schemas/TravelTrip" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      operationId: createTrip
      summary: Create a trip
      tags: [travel]
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateTripRequest" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  trip: { $ref: "#/components/schemas/TravelTrip" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /life/travel/trips/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string }
    get:
      operationId: getTrip
      tags: [travel]
      security:
        - sessionAuth: []
      responses:
        "200":
          description: Trip
          content:
            application/json:
              schema:
                type: object
                properties:
                  trip: { $ref: "#/components/schemas/TravelTrip" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      operationId: updateTrip
      tags: [travel]
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateTripRequest" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  trip: { $ref: "#/components/schemas/TravelTrip" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      operationId: deleteTrip
      tags: [travel]
      security:
        - sessionAuth: []
      responses:
        "204": { description: Deleted }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /life/travel/trips/{id}/destinations:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string }
    get:
      operationId: listDestinations
      tags: [travel]
      security: [ { sessionAuth: [] } ]
      responses:
        "200":
          description: Destinations
          content:
            application/json:
              schema:
                type: object
                properties:
                  destinations:
                    type: array
                    items: { $ref: "#/components/schemas/TravelDestination" }
    post:
      operationId: addDestination
      tags: [travel]
      security: [ { sessionAuth: [] } ]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AddDestinationRequest" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  destination: { $ref: "#/components/schemas/TravelDestination" }

  /life/travel/trips/{id}/destinations/reorder:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string }
    post:
      operationId: reorderDestinations
      tags: [travel]
      security: [ { sessionAuth: [] } ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [order]
              properties:
                order:
                  type: array
                  items: { type: string }
      responses:
        "200": { description: Reordered }

  /life/travel/destinations/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string }
    patch:
      operationId: updateDestination
      tags: [travel]
      security: [ { sessionAuth: [] } ]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateDestinationRequest" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  destination: { $ref: "#/components/schemas/TravelDestination" }
    delete:
      operationId: deleteDestination
      tags: [travel]
      security: [ { sessionAuth: [] } ]
      responses:
        "204": { description: Deleted }

  /life/travel/destinations/{id}/activities:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string }
    post:
      operationId: addActivity
      tags: [travel]
      security: [ { sessionAuth: [] } ]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AddActivityRequest" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  activity: { $ref: "#/components/schemas/TravelActivity" }

  /life/travel/trips/{id}/activities:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string }
    get:
      operationId: listTripActivities
      tags: [travel]
      security: [ { sessionAuth: [] } ]
      responses:
        "200":
          description: Activities
          content:
            application/json:
              schema:
                type: object
                properties:
                  activities:
                    type: array
                    items: { $ref: "#/components/schemas/TravelActivity" }

  /life/travel/activities/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string }
    patch:
      operationId: updateActivity
      tags: [travel]
      security: [ { sessionAuth: [] } ]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateActivityRequest" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  activity: { $ref: "#/components/schemas/TravelActivity" }
    delete:
      operationId: deleteActivity
      tags: [travel]
      security: [ { sessionAuth: [] } ]
      responses:
        "204": { description: Deleted }

  /life/travel/trips/{id}/reservations:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string }
    get:
      operationId: listReservations
      tags: [travel]
      security: [ { sessionAuth: [] } ]
      responses:
        "200":
          description: Reservations
          content:
            application/json:
              schema:
                type: object
                properties:
                  reservations:
                    type: array
                    items: { $ref: "#/components/schemas/TravelReservation" }
    post:
      operationId: addReservation
      tags: [travel]
      security: [ { sessionAuth: [] } ]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AddReservationRequest" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  reservation: { $ref: "#/components/schemas/TravelReservation" }

  /life/travel/reservations/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string }
    patch:
      operationId: updateReservation
      tags: [travel]
      security: [ { sessionAuth: [] } ]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateReservationRequest" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  reservation: { $ref: "#/components/schemas/TravelReservation" }
    delete:
      operationId: deleteReservation
      tags: [travel]
      security: [ { sessionAuth: [] } ]
      responses:
        "204": { description: Deleted }

  /life/travel/trips/{id}/tickets:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string }
    get:
      operationId: listTickets
      tags: [travel]
      security: [ { sessionAuth: [] } ]
      responses:
        "200":
          description: Tickets
          content:
            application/json:
              schema:
                type: object
                properties:
                  tickets:
                    type: array
                    items: { $ref: "#/components/schemas/TravelTicket" }
    post:
      operationId: uploadTicket
      tags: [travel]
      security: [ { sessionAuth: [] } ]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file: { type: string, format: binary }
                title: { type: string }
                kind: { type: string, enum: [transit, event, pass, voucher] }
                reservationId: { type: string }
                issuedTo: { type: string }
                validFrom: { type: string, format: date-time }
                validUntil: { type: string, format: date-time }
      responses:
        "201":
          description: Uploaded
          content:
            application/json:
              schema:
                type: object
                properties:
                  ticket: { $ref: "#/components/schemas/TravelTicket" }

  /life/travel/tickets/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string }
    delete:
      operationId: deleteTicket
      tags: [travel]
      security: [ { sessionAuth: [] } ]
      responses:
        "204": { description: Deleted }

  /life/travel/preferences:
    get:
      operationId: getTravelPreferences
      tags: [travel]
      security: [ { sessionAuth: [] } ]
      responses:
        "200":
          description: Preferences
          content:
            application/json:
              schema:
                type: object
                properties:
                  preferences: { $ref: "#/components/schemas/TravelPreferences" }
    put:
      operationId: updateTravelPreferences
      tags: [travel]
      security: [ { sessionAuth: [] } ]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TravelPreferencesInput" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  preferences: { $ref: "#/components/schemas/TravelPreferences" }

components:
  securitySchemes:
    sessionAuth:
      type: apiKey
      in: cookie
      name: better-auth.session_token

  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
        service:
          type: string

    FileInfo:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        size:
          type: integer
          format: int64
        mimeType:
          type: string
        createdAt:
          type: string
          format: date-time
        url:
          type: string

    CreatePasteRequest:
      type: object
      required: [content]
      properties:
        title:
          type: string
          default: ""
        content:
          type: string
        format:
          type: string
          enum: [text, markdown, json, code]
          default: text
        visibility:
          type: string
          enum: [public, unlisted]
          default: public
        expiresIn:
          type: integer
          format: int64
          description: Expiry duration in seconds. 0 means never expires.
          default: 0

    UpdatePasteRequest:
      type: object
      properties:
        title:
          type: string
        content:
          type: string
        format:
          type: string
          enum: [text, markdown, json, code]
        visibility:
          type: string
          enum: [public, unlisted]

    PasteAuthor:
      type: object
      properties:
        name:
          type: string
        image:
          type: string

    PasteInfo:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        format:
          type: string
          enum: [text, markdown, json, code]
        visibility:
          type: string
          enum: [public, unlisted]
        size:
          type: integer
          format: int64
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        url:
          type: string

    PasteDetail:
      allOf:
        - $ref: "#/components/schemas/PasteInfo"
        - type: object
          properties:
            content:
              type: string
            author:
              $ref: "#/components/schemas/PasteAuthor"

    PasteCreateResponse:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        format:
          type: string
          enum: [text, markdown, json, code]
        visibility:
          type: string
          enum: [public, unlisted]
        size:
          type: integer
          format: int64
        createdAt:
          type: string
          format: date-time
        url:
          type: string

    DNSLookupRequest:
      type: object
      required: [domain, type, turnstileToken]
      properties:
        domain:
          type: string
          example: example.com
        type:
          type: string
          enum: [A, AAAA, CNAME, MX, TXT, NS, SOA, SRV, CAA, PTR]
          example: A
        turnstileToken:
          type: string
          description: Cloudflare Turnstile challenge token

    DNSLookupResponse:
      type: object
      properties:
        domain:
          type: string
        type:
          type: string
        records:
          description: >
            Array of results whose shape depends on the record type.
            A/AAAA/CNAME/NS/TXT/PTR return strings.
            MX returns {host, priority} objects.
            SOA returns {ns, mbox, serial, refresh, retry, expire, minttl} objects.
            SRV returns {target, port, priority, weight} objects.
            CAA returns {flag, tag, value} objects.
          oneOf:
            - type: array
              items:
                type: string
            - type: array
              items:
                type: object
        ttl:
          type: integer
          format: int64
          description: Minimum TTL observed across returned records (seconds)
        resolvedAt:
          type: string
          format: date-time

    ErrorResponse:
      type: object
      properties:
        error:
          type: string

    TravelTrip:
      type: object
      properties:
        id: { type: string }
        ownerUserId: { type: string }
        title: { type: string }
        summary: { type: string }
        startDate: { type: string, nullable: true }
        endDate: { type: string, nullable: true }
        coverImageUrl: { type: string }
        status:
          type: string
          enum: [planning, booked, ongoing, completed, cancelled]
        budgetCurrency: { type: string }
        role:
          type: string
          enum: [owner, editor, viewer]
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    CreateTripRequest:
      type: object
      required: [title]
      properties:
        title: { type: string }
        summary: { type: string }
        startDate: { type: string, description: YYYY-MM-DD }
        endDate: { type: string, description: YYYY-MM-DD }
        budgetCurrency: { type: string, default: USD }
        coverImageUrl: { type: string }

    UpdateTripRequest:
      type: object
      properties:
        title: { type: string }
        summary: { type: string }
        startDate: { type: string, nullable: true }
        endDate: { type: string, nullable: true }
        coverImageUrl: { type: string }
        status: { type: string, enum: [planning, booked, ongoing, completed, cancelled] }
        budgetCurrency: { type: string }

    TravelDestination:
      type: object
      properties:
        id: { type: string }
        tripId: { type: string }
        ordinal: { type: integer }
        name: { type: string }
        mapboxPlaceId: { type: string }
        country: { type: string }
        region: { type: string }
        lat: { type: number, nullable: true }
        lng: { type: number, nullable: true }
        arriveAt: { type: string, format: date-time, nullable: true }
        departAt: { type: string, format: date-time, nullable: true }
        notes: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    AddDestinationRequest:
      type: object
      required: [name]
      properties:
        name: { type: string }
        mapboxPlaceId: { type: string }
        country: { type: string }
        region: { type: string }
        lat: { type: number }
        lng: { type: number }
        arriveAt: { type: string, format: date-time }
        departAt: { type: string, format: date-time }
        notes: { type: string }

    UpdateDestinationRequest:
      type: object
      properties:
        name: { type: string }
        country: { type: string }
        region: { type: string }
        lat: { type: number, nullable: true }
        lng: { type: number, nullable: true }
        arriveAt: { type: string, format: date-time, nullable: true }
        departAt: { type: string, format: date-time, nullable: true }
        notes: { type: string }

    TravelActivity:
      type: object
      properties:
        id: { type: string }
        tripId: { type: string }
        destinationId: { type: string }
        title: { type: string }
        category:
          type: string
          enum: [sightseeing, food, nightlife, outdoor, wellness, other]
        startAt: { type: string, format: date-time, nullable: true }
        endAt: { type: string, format: date-time, nullable: true }
        lat: { type: number, nullable: true }
        lng: { type: number, nullable: true }
        address: { type: string }
        costAmount: { type: number, nullable: true }
        costCurrency: { type: string }
        bookingUrl: { type: string }
        notes: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    AddActivityRequest:
      type: object
      required: [title]
      properties:
        title: { type: string }
        category: { type: string }
        startAt: { type: string, format: date-time }
        endAt: { type: string, format: date-time }
        lat: { type: number }
        lng: { type: number }
        address: { type: string }
